services:
  redis:
    image: redis:alpine
    container_name: partageonsleau-orchestration-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis_data:/data
    networks:
      - partageonsleau-orchestration-network

networks:
  partageonsleau-orchestration-network:
    name: partageonsleau-orchestration-network

volumes:
  redis_data:
